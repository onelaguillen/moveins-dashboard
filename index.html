<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Move-Ins — Belong</title>
<link rel="icon" href="https://belonghome.com/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/app.css">
</head>
<body>

<div id="loadingState" class="loading-screen">Checking access…</div>

<div id="pageContent" style="display:none">
  <div id="appHeader"></div>

  <div class="page">

    <!-- Metric strip (clickable status filters) -->
    <div class="metric-strip" id="metricStrip"></div>

    <!-- Filter row -->
    <div class="filter-row">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input class="search-input" id="fSearch" placeholder="Search address, resident, specialist, HomeId, notes…">
      </div>

      <div class="date-group">
        <span class="date-label">From</span>
        <input type="date" class="date-input" id="fFrom">
        <span class="date-sep">—</span>
        <input type="date" class="date-input" id="fTo">
      </div>

      <div style="display:flex;gap:6px">
        <button class="chip-btn" id="chip_overdue"   onclick="setDateChip('overdue')">Overdue</button>
        <button class="chip-btn" id="chip_this_week" onclick="setDateChip('this_week')">This Week</button>
        <button class="chip-btn" id="chip_30_days"   onclick="setDateChip('30_days')">30 Days</button>
      </div>

      <select class="select-input" id="fRegion"><option value="">All regions</option></select>
      <select class="select-input" id="fSpecialist"><option value="">All specialists</option></select>

      <button class="btn btn-ghost" id="fClear" style="margin-left:auto">Clear</button>
    </div>

    <!-- Homes table -->
    <div class="card">
      <div class="table-header">
        <div class="table-count" id="tableCount">Loading…</div>
        <select class="page-size-select" id="pageSizeSelect" onchange="changePageSize()">
          <option value="10">10 per page</option>
          <option value="20" selected>20 per page</option>
          <option value="50">50 per page</option>
          <option value="100">100 per page</option>
        </select>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>Address</th>
              <th>Resident</th>
              <th>Move-In</th>
              <th>Payment</th>
              <th>HOA</th>
              <th>HQS</th>
              <th>Status</th>
              <th style="width:90px">Repairs</th>
            </tr>
          </thead>
          <tbody id="homesBody">
            <tr><td><div class="skel" style="width:240px"></div></td><td><div class="skel" style="width:120px"></div></td><td><div class="skel" style="width:70px"></div></td><td><div class="skel" style="width:80px"></div></td><td><div class="skel" style="width:70px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:80px"></div></td><td></td></tr>
            <tr><td><div class="skel" style="width:200px"></div></td><td><div class="skel" style="width:130px"></div></td><td><div class="skel" style="width:70px"></div></td><td><div class="skel" style="width:80px"></div></td><td><div class="skel" style="width:70px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:80px"></div></td><td></td></tr>
            <tr><td><div class="skel" style="width:260px"></div></td><td><div class="skel" style="width:110px"></div></td><td><div class="skel" style="width:70px"></div></td><td><div class="skel" style="width:80px"></div></td><td><div class="skel" style="width:70px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:80px"></div></td><td></td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination" style="display:none">
        <div class="page-info" id="pageInfo"></div>
        <div class="page-btns" id="pageBtns"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/assets/supabase.js"></script>
<script src="/assets/nav.js"></script>
<script src="/assets/dashboard.js"></script>
</body>
</html>
