<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Move-Ins — Belong</title>
<link rel="icon" href="https://belonghome.com/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/app.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>

<div id="loadingState" class="loading-screen">Checking access…</div>

<div id="pageContent" style="display:none">
  <div id="appHeader"></div>

  <div class="page">

    <!-- Metric strip (clickable status filters) -->
    <div class="metric-strip" id="metricStrip"></div>

    <!-- Filter row -->
    <div class="filter-row">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 19 26" fill="none" width="14" height="18" class="search-badge">
        <path fill="#3EE4A9" fill-rule="evenodd" d="M14.364 19.266c-.762 0-1.475.43-1.796 1.131q-.238.518-.616.944-1.017 1.14-2.602 1.14t-2.601-1.14a3.8 3.8 0 0 1-.616-.944 1.97 1.97 0 0 0-1.796-1.131c-1.533 0-2.466 1.696-1.678 3.029q.477.804 1.177 1.506Q6.03 26 9.35 25.999t5.515-2.198q.7-.702 1.176-1.506c.789-1.333-.145-3.03-1.677-3.03" clip-rule="evenodd"></path>
        <path fill="rgba(0,0,0,0.7)" fill-rule="evenodd" d="M18.427 8.186c-.15-.096-1.33-.802-1.799-1.017l-.58-1.403c.172-.465.503-1.766.561-1.992a.63.63 0 0 0-.169-.58l-.915-.91a.62.62 0 0 0-.58-.169c-.173.04-1.498.375-1.992.562l-1.404-.58c-.204-.45-.891-1.601-1.016-1.8a.62.62 0 0 0-.53-.297H8.716a.63.63 0 0 0-.53.292c-.095.15-.8 1.33-1.016 1.798l-1.403.581C5.3 2.498 4 2.167 3.774 2.11a.63.63 0 0 0-.58.168l-.91.915a.62.62 0 0 0-.169.58c.04.173.375 1.498.562 1.993l-.58 1.403c-.45.204-1.601.892-1.8 1.017a.62.62 0 0 0-.297.53V10c0 .215.11.415.292.53.15.096 1.33.802 1.798 1.017l.581 1.404c-.173.464-.504 1.765-.561 1.992v-.001c-.047.21.016.429.168.58l.91.91c.151.153.37.216.58.169.172-.04 1.497-.375 1.992-.562l1.404.58c.204.45.89 1.601 1.016 1.8v-.001a.62.62 0 0 0 .535.3h1.286c.215 0 .415-.11.53-.292.096-.15.802-1.33 1.017-1.799l1.404-.58c.464.172 1.765.503 1.992.561h-.001c.21.047.429-.017.58-.169l.91-.91a.62.62 0 0 0 .169-.58c-.04-.172-.375-1.497-.562-1.991l.58-1.404c.45-.204 1.601-.891 1.8-1.016h-.001a.62.62 0 0 0 .3-.535V8.715a.62.62 0 0 0-.292-.53m-9.049 5.238a4.085 4.085 0 1 1 .006-8.171 4.085 4.085 0 0 1-.006 8.171" clip-rule="evenodd"></path>
        <path fill="#FFAF00" fill-rule="evenodd" d="M11.87 9.358a2.511 2.511 0 1 1-5.022 0 2.511 2.511 0 0 1 5.022 0" clip-rule="evenodd"></path>
      </svg>

      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input class="search-input" id="fSearch" placeholder="Search address, resident, specialist, HomeId, notes…">
      </div>

      <div class="date-group">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:.6">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <input type="text" class="date-input date-range" id="fDateRange" placeholder="Pick date or range…" readonly>
        <button type="button" class="date-clear" id="fDateClear" title="Clear dates" aria-label="Clear dates" style="display:none">×</button>
      </div>

      <div style="display:flex;gap:6px">
        <button class="chip-btn" id="chip_overdue"   onclick="setDateChip('overdue')">Overdue</button>
        <button class="chip-btn" id="chip_this_week" onclick="setDateChip('this_week')">This Week</button>
        <button class="chip-btn" id="chip_30_days"   onclick="setDateChip('30_days')">30 Days</button>
        <button class="chip-btn" id="chip_fast_movein" onclick="toggleFastMoveInFilter()" title="Show only Fast Move-Ins (≤5 business days)">⚡ Fast</button>
        <button class="chip-btn" id="chip_no_qa" onclick="toggleNoQaFilter()" title="Show only homes missing the QA inspection group">🚫 No QA</button>
        <button class="chip-btn" id="chip_handed_off" onclick="toggleHandedOffFilter()" title="Include homes handed off to concierge">🤝 Handed off</button>
      </div>

      <select class="select-input" id="fRegion"><option value="">All regions</option></select>
      <select class="select-input" id="fSpecialist"><option value="">All specialists</option></select>

      <button class="btn btn-ghost" id="fClear" style="margin-left:auto">Clear</button>
    </div>

    <!-- Homes table -->
    <div class="card">
      <div class="table-header">
        <div class="table-count" id="tableCount">Loading…</div>
        <select class="page-size-select" id="pageSizeSelect" onchange="changePageSize()">
          <option value="10">10 per page</option>
          <option value="20" selected>20 per page</option>
          <option value="50">50 per page</option>
          <option value="100">100 per page</option>
        </select>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead id="homesHead">
            <tr>
              <th>Address<button type="button" class="col-menu-btn" data-col="Address" onclick="toggleColumnMenu(event, 'Address')" title="Sort & filter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg></button></th>
              <th>Resident<button type="button" class="col-menu-btn" data-col="Resident" onclick="toggleColumnMenu(event, 'Resident')" title="Sort & filter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg></button></th>
              <th>Move-In<button type="button" class="col-menu-btn" data-col="lease_start_on" onclick="toggleColumnMenu(event, 'lease_start_on')" title="Sort & filter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg></button></th>
              <th>Payment<button type="button" class="col-menu-btn" data-col="Payment" onclick="toggleColumnMenu(event, 'Payment')" title="Sort & filter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg></button></th>
              <th>HOA<button type="button" class="col-menu-btn" data-col="HOA" onclick="toggleColumnMenu(event, 'HOA')" title="Sort & filter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg></button></th>
              <th>HQS<button type="button" class="col-menu-btn" data-col="HQS" onclick="toggleColumnMenu(event, 'HQS')" title="Sort & filter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg></button></th>
              <th>Status<button type="button" class="col-menu-btn" data-col="Status" onclick="toggleColumnMenu(event, 'Status')" title="Sort & filter"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg></button></th>
              <th style="width:90px">Repairs</th>
            </tr>
          </thead>
          <tbody id="homesBody">
            <tr><td><div class="skel" style="width:240px"></div></td><td><div class="skel" style="width:120px"></div></td><td><div class="skel" style="width:70px"></div></td><td><div class="skel" style="width:80px"></div></td><td><div class="skel" style="width:70px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:80px"></div></td><td></td></tr>
            <tr><td><div class="skel" style="width:200px"></div></td><td><div class="skel" style="width:130px"></div></td><td><div class="skel" style="width:70px"></div></td><td><div class="skel" style="width:80px"></div></td><td><div class="skel" style="width:70px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:80px"></div></td><td></td></tr>
            <tr><td><div class="skel" style="width:260px"></div></td><td><div class="skel" style="width:110px"></div></td><td><div class="skel" style="width:70px"></div></td><td><div class="skel" style="width:80px"></div></td><td><div class="skel" style="width:70px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:80px"></div></td><td></td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination" style="display:none">
        <div class="page-info" id="pageInfo"></div>
        <div class="page-btns" id="pageBtns"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="/assets/supabase.js"></script>
<script src="/assets/dataSource.js"></script>
<script src="/assets/derive.js"></script>
<script src="/assets/nav.js"></script>
<script src="/assets/dashboard.js"></script>
</body>
</html>
