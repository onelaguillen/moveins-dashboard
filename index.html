<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Move-Ins — Belong</title>
<link rel="icon" href="https://belonghome.com/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/app.css">
</head>
<body>

<div id="loadingState" class="loading-screen">Checking access…</div>

<div id="pageContent" style="display:none">
  <div id="appHeader"></div>

  <div class="page">
    <!-- Filters -->
    <div class="filters">
      <div class="filter-field" style="flex:1;min-width:200px">
        <label class="filter-label" for="fSearch">Search</label>
        <input class="filter-input" id="fSearch" placeholder="Address, resident, specialist, HomeId…">
      </div>
      <div class="filter-field">
        <label class="filter-label" for="fStatus">Status</label>
        <select class="filter-select" id="fStatus">
          <option value="">All statuses</option>
          <option value="ready">Ready</option>
          <option value="grant_access">Grant Access</option>
          <option value="postponed">Postponed</option>
          <option value="in_progress">In Progress</option>
          <option value="signed_off">Signed Off</option>
        </select>
      </div>
      <div class="filter-field">
        <label class="filter-label" for="fRegion">Region</label>
        <select class="filter-select" id="fRegion"><option value="">All regions</option></select>
      </div>
      <div class="filter-field">
        <label class="filter-label" for="fSpecialist">Specialist</label>
        <select class="filter-select" id="fSpecialist"><option value="">All specialists</option></select>
      </div>
      <button class="btn btn-ghost filter-clear" id="fClear">Clear</button>
    </div>

    <!-- Homes table -->
    <div class="card">
      <div class="table-header">
        <div class="table-count" id="tableCount">Loading…</div>
        <select class="page-size-select" id="pageSizeSelect" onchange="changePageSize()">
          <option value="10">10 per page</option>
          <option value="20" selected>20 per page</option>
          <option value="50">50 per page</option>
          <option value="100">100 per page</option>
        </select>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th style="width:90px">ID</th>
              <th>Address</th>
              <th>Region</th>
              <th>Specialist</th>
              <th>Move-In</th>
              <th>Status</th>
              <th style="width:130px"></th>
            </tr>
          </thead>
          <tbody id="homesBody">
            <tr><td><div class="skel" style="width:60px"></div></td><td><div class="skel" style="width:240px"></div></td><td><div class="skel" style="width:80px"></div></td><td><div class="skel" style="width:120px"></div></td><td><div class="skel" style="width:80px"></div></td><td><div class="skel" style="width:80px"></div></td><td></td></tr>
            <tr><td><div class="skel" style="width:60px"></div></td><td><div class="skel" style="width:200px"></div></td><td><div class="skel" style="width:60px"></div></td><td><div class="skel" style="width:140px"></div></td><td><div class="skel" style="width:80px"></div></td><td><div class="skel" style="width:80px"></div></td><td></td></tr>
            <tr><td><div class="skel" style="width:60px"></div></td><td><div class="skel" style="width:260px"></div></td><td><div class="skel" style="width:70px"></div></td><td><div class="skel" style="width:110px"></div></td><td><div class="skel" style="width:80px"></div></td><td><div class="skel" style="width:80px"></div></td><td></td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination" style="display:none">
        <div class="page-info" id="pageInfo"></div>
        <div class="page-btns" id="pageBtns"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/assets/supabase.js"></script>
<script src="/assets/nav.js"></script>
<script src="/assets/dashboard.js"></script>
</body>
</html>
