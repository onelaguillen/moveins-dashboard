<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ready for Sign-Off — Belong</title>
<link rel="icon" href="https://belonghome.com/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/app.css">
</head>
<body>

<div id="loadingState" class="loading-screen">Checking access…</div>

<div id="pageContent" style="display:none">
  <div id="appHeader"></div>

  <div class="page-narrow">
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div>
        <h1 style="font-size:22px;font-weight:700;margin-bottom:4px">Ready for Sign-Off</h1>
        <div id="readyCount" style="font-size:12px;color:var(--muted);font-weight:500">Loading…</div>
      </div>
    </div>

    <div id="readOnlyNote"
         style="display:none;margin-bottom:16px;padding:12px 16px;background:var(--amber-dim);border:1px solid var(--amber-border);border-radius:var(--rsm);font-size:12px;color:var(--amber);font-weight:500">
      👀 View-only — sign-off actions are restricted to Tami.
    </div>

    <div id="readyList"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/assets/supabase.js"></script>
<script src="/assets/nav.js"></script>
<script src="/assets/ready.js"></script>
</body>
</html>
